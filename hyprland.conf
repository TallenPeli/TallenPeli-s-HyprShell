
##############
### COLORS ###
##############

source=~/.config/hypr/colors.conf

################
### MONITORS ###
################

# Please change this to match your monitor configuration.
# run `hyprctl monitors` to get a list of monitors and resolutions

monitor=DP-1,2560x1440@165,2560x0,1
monitor=DP-2,2560x1440@165,0x0,1

################
### PROGRAMS ###
################

# Change these if you want but it might not work with the rest of my dots
$terminal = ghostty
$menu = ags request -i "tallens-gtk-shell" "launcher"
$fileManager = nautilus
$browser = zen-browser

#################
### AUTOSTART ###
#################

exec-once = hyprpaper
exec-once = clipboard-sync # This is for syncing the Wayland and X11 clipboard
exec-once = wl-paste --watch cliphist store # For saving clipboard history
exec-once = $HOME/.config/hypr/scripts/fullscreen-monitor.sh
exec-once = dunst -conf $HOME/.config/dunst/dunstrc
exec-once = discover-overlay
exec-once = ags run # run the shell

# Gsettings
exec-once = gsettings set org.gnome.desktop.interface cursor-theme Bibata-Modern-Classic
exec = gsettings set org.gnome.desktop.interface color-scheme "default"
exec = gsettings set org.gnome.desktop.interface gtk-theme "adw-gtk3-dark"
exec = gsettings set org.gnome.desktop.interface color-scheme "prefer-dark"

exec-once = dbus-update-activation-environment --systemd WAYLAND_DISPLAY XDG_CURRENT_DESKTOP
exec-once = udiskie

#############################
### ENVIRONMENT VARIABLES ###
#############################

env = HYPRCURSOR_THEME,Bibata-Modern-Classic
env = XCURSOR_THEME,Babata-Modern-Classic
env = XCURSOR_SIZE,24
env = HYPRCURSOR_SIZE,24
env = EDITOR,nvim

env = QT_QPA_PLATFORMTHEME,qt6ct
env = TERMINAL,/usr/bin/kitty
env = XDG_CURRENT_DESKTOP,Hyprland
env = XDG_SESSION_TYPE,wayland
env = XDG_SESSION_DESKTOP,Hyprland

#####################
### LOOK AND FEEL ###
#####################

spash = false

general {
    gaps_in = 4
    gaps_out = 8
    border_size = 2
    resize_on_border = true

    allow_tearing = false

    col.active_border = $border
    col.inactive_border = $border_dim
}

decoration {
    rounding = 10 

    dim_inactive = true
    dim_strength = 0.06

    active_opacity = 1.0
    inactive_opacity = 0.90 


    shadow {
        enabled = false
        range = 4
        render_power = 3
    }

    blur {
        noise = 0.03
        enabled = true
        size = 10
        passes = 5

        vibrancy = 0.1696
    }
}

animations {
    enabled = yes

    bezier = easeOutQuint,0.58,0.51,0.3,1
    bezier = easeInOutCubic,0.4, 0.0, 0.2, 1.0
    bezier = linear,0,0,1,1
    bezier = almostLinear,0.35,0.27,0,0.99
    bezier = quick,0.28,0.34,0,0.99

    animation = global, 1, 10, default
    animation = border, 1, 5.39, easeOutQuint

    animation = windows, 1, 1.5, almostLinear
    animation = windowsIn, 1, 3, almostLinear, slide 87%
    animation = windowsOut, 1, 4, almostLinear, slide 87%

    animation = fadeIn, 1, 1.73, almostLinear
    animation = fadeOut, 1, 1.46, almostLinear
    animation = fade, 1, 3.03, quick

    animation = workspaces, 1, 1, almostLinear, slide 
    animation = workspacesIn, 1, 2, almostLinear, slide
    animation = workspacesOut, 1, 2, almostLinear, slide

    # animation = layers, 1, 4, almostLinear, slide
    animation = layersIn, 1, 4, almostLinear, slide
    # animation = layersOut, 1, 4, almostLinear, slide
    animation = fadeLayersIn, 1, 1.79, almostLinear
    animation = fadeLayersOut, 1, 1.39, almostLinear
}

dwindle {
    pseudotile = true # Master switch for pseudotiling. Enabling is bound to mainMod + P in the keybinds section below
    preserve_split = true # You probably want this
}

master {
    new_status = master
}

misc {
    vfr = true
    force_default_wallpaper = 0
    disable_hyprland_logo = true
}

#############
### INPUT ###
#############

input {
    kb_layout = us
    kb_variant =
    kb_model =
    kb_options =
    kb_rules =
    follow_mouse = 1
    sensitivity = -0.1 # -1.0 - 1.0, 0 means no modification.
}

###################
### KEYBINDINGS ###
###################

$mainMod = SUPER # Sets "Windows" key as main modifier

bind = $mainMod, ESCAPE, exec, $terminal -e nvim $HOME/.config/hypr/hyprland.conf
bind = $mainMod, N, exec, $terminal -e nvim ~/Code/
bind = $mainMod, C, exec, $terminal
bind = $mainMod, F, exec, $browser
bind = $mainMod, Q, killactive,
bind = Super+Shift+Alt, Q, exec, hyprctl kill
bind = $mainMod, M, exec, ags request -i "tallens-gtk-shell" "power-menu"
bind = $mainMod, E, exec, $fileManager
bind = $mainMod, T, togglefloating,
bind = $mainMod, SUPER_L, exec, $menu
bind = $mainMod, P, pseudo, # dwindle
bind = $mainMod, J, togglesplit, # Change between horizontal and vertical splits
bind = $mainMod, K, swapsplit, # Swap the current split with the main one
bind = $mainMod+SHIFT, F, fullscreen
bind = $mainMod, D, fullscreenstate, 1 # Toggle maximized

# Pin windows
bind = $mainMod+SHIFT, P, pin

# Desktop Keybinds
bind = $mainMod, H, exec, /home/tallen/.config/hypr/scripts/fuzzel-help.sh # open fuzzel for keybinds
bind = $mainMod, PERIOD, exec, /home/tallen/.config/hypr/scripts/fuzzel-emoji.sh
bind = $mainMod+SHIFT, C , exec, /home/tallen/.config/hypr/scripts/fuzzel-config.sh
bind = $mainMod, SPACE, exec, /home/tallen/.config/hypr/scripts/fuzzel-code.sh

bind = $mainMod, L, exec, hyprlock

# Screenshots
bind = $mainMod, S, exec, hyprshot -o $HOME/Pictures/Screenshots/ -m active --mode output --freeze
bind = $mainMod+SHIFT, S, exec, hyprshot -o $HOME/Pictures/Screenshots/ -m region --freeze
bind = $mainMod+CONTROL, S, exec, hyprshot -o $HOME/Pictures/Screenshots/ -m window --freeze

bind = $mainMod+CONTROL, p, exec, $HOME/.config/hypr/scripts/color-picker.sh

bind = CONTROL+ALT, DELETE, exec, $HOME/.config/hypr/scripts/fuzzel-power.sh
bind = $mainMod+SHIFT, V, exec, $HOME/.config/hypr/scripts/fuzzel-clip.sh
bind = $mainMod+SHIFT, N, exec, $HOME/.config/hypr/scripts/fuzzel-notification.sh
bind = $mainMod+CONTROL, p, exec, $HOME/.config/hypr/scripts/fuzzel-power-profiles.sh

# Screen Recording
bind = $mainMod, R, exec, $HOME/.config/hypr/scripts/hypr-screen-record.sh --fullscreen-sound
bind = $mainMod+SHIFT, R, exec, $HOME/.config/hypr/scripts/hypr-screen-record.sh --sound

# No audio
bind = $mainMod+ALT+SHIFT, R, exec, $HOME/.config/hypr/scripts/hypr-screen-record.sh
bind = $mainMod+ALT, R, exec, $HOME/.config/hypr/scripts/hypr-screen-record.sh --fullscreen

bind = $mainMod, left, movefocus, l
bind = $mainMod, right, movefocus, r
bind = $mainMod, up, movefocus, u
bind = $mainMod, down, movefocus, d

bind = $mainMod+CONTROL, left, workspace, r-1
bind = $mainMod+CONTROL, right, workspace, r+1

bind = $mainMod+ALT, SPACE, togglespecialworkspace
bind = ALT, Tab, cyclenext

bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9
bind = $mainMod, 0, workspace, 10

bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5
bind = $mainMod SHIFT, 6, movetoworkspace, 6
bind = $mainMod SHIFT, 7, movetoworkspace, 7
bind = $mainMod SHIFT, 8, movetoworkspace, 8
bind = $mainMod SHIFT, 9, movetoworkspace, 9
bind = $mainMod SHIFT, 0, movetoworkspace, 10

bind = $mainMod, mouse_down, workspace, e+1
bind = $mainMod, mouse_up, workspace, e+1

bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow

bindel = ,XF86AudioRaiseVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%+
bindel = ,XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
bindel = ,XF86AudioMute, exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
bindel = ,XF86AudioMicMute, exec, wpctl set-mute @DEFAULT_AUDIO_SOURCE@ toggle
bindel = ,XF86MonBrightnessUp, exec, brightnessctl s 10%+
bindel = ,XF86MonBrightnessDown, exec, brightnessctl s 10%-

bindl = , XF86AudioNext, exec, playerctl next
bindl = , XF86AudioPause, exec, playerctl play-pause
bindl = , XF86AudioPlay, exec, playerctl play-pause
bindl = , XF86AudioPrev, exec, playerctl previous

bind = Ctrl+Super, R, exec, killall gjs; ags run & 

windowrule {
  name = windowrule-1
  suppress_event = maximize
  match:class = .*
}

windowrule {
  name = windowrule-2
  no_focus = on
  match:class = ^$
  match:title = ^$
  match:xwayland = 1
  match:float = 1
  match:fullscreen = 0
  match:pin = 0
}

windowrule {
    name = picture-in-picture
    tag = +pip
    match:title = Picture-in-Picture
    float = on
    pin = on
    opacity = 1
    move = (monitor_w-window_w-16) (60)
    size = 400 225
}

windowrule {
  name = terminal
  tag = +term
  match:class = com.mitchellh.ghostty
}

windowrule {
  name = windowrule-4
  tag = +blur
  match:class = spotify
}

windowrule {
  name = windowrule-5
  tag = +blur
  match:class = Spotify # For the Flatpak version
}

windowrule {
  name = windowrule-6
  tag = +blur
  match:class = org.gnome.Nautilus
}


windowrule {
  name = terminal-opacity
  opacity = 0.90
  match:tag = term
}

windowrule {
  name = app-blur
  opacity = 0.95
  match:tag = blur
}


windowrule {
  name = windowrule-10
  opacity = 1.0 override
  match:title = .*YouTube.*
}

# Layer shell rules
layerrule {
  name = layerrule-1
  blur = on
  # no_anim = on
  ignore_alpha = 0.5
  match:namespace = tallens-gtk-shell
}
